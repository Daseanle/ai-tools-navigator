<\!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线 - AI Tools Navigator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.6;
        }
        .retry-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
        .features {
            margin-top: 3rem;
            text-align: left;
            max-width: 400px;
        }
        .feature {
            display: flex;
            align-items: center;
            margin: 1rem 0;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
        }
        .feature-icon {
            margin-right: 1rem;
            font-size: 1.2rem;
        }
        .feature-text {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📱</div>
        <h1>您当前处于离线状态</h1>
        <p>
            无法连接到网络，但您仍然可以浏览一些已缓存的内容。
            当网络恢复时，我们将自动同步最新数据。
        </p>
        
        <button class="retry-btn" onclick="window.location.reload()">
            重新连接
        </button>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <div class="feature-text">浏览已缓存的工具信息</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⭐</div>
                <div class="feature-text">查看您的收藏夹</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">离线数据会自动同步</div>
            </div>
        </div>
    </div>

    <script>
        // Check for network connectivity
        function checkConnection() {
            if (navigator.onLine) {
                window.location.reload()
            }
        }
        
        // Listen for network status changes
        window.addEventListener('online', checkConnection)
        
        // Periodic check
        setInterval(checkConnection, 5000)
        
        // Show network status
        function updateNetworkStatus() {
            if (navigator.onLine) {
                checkConnection()
            }
        }
        
        window.addEventListener('load', updateNetworkStatus)
    </script>
</body>
</html>
