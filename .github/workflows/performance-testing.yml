name: Performance Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18'
  LIGHTHOUSE_CI_TOKEN: ${{ secrets.LIGHTHOUSE_CI_TOKEN }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  lighthouse-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Start application
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for app to start
        run: sleep 10

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v3
        with:
          name: lighthouse-results
          path: .lighthouseci/

  bundle-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Analyze bundle
        run: |
          npm run build:analyze
          # 生成bundle分析报告
          npx webpack-bundle-analyzer .next/analyze/bundle.json --mode static --no-open --report bundle-report.html

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v3
        with:
          name: bundle-analysis
          path: bundle-report.html

      - name: Check bundle size
        run: |
          # 获取bundle大小
          BUNDLE_SIZE=$(du -sh .next/static/chunks/ | cut -f1)
          echo "Bundle size: $BUNDLE_SIZE"
          
          # 检查是否超过限制 (5MB)
          if [ $(du -s .next/static/chunks/ | cut -f1) -gt 5120 ]; then
            echo "::error::Bundle size exceeds 5MB limit"
            exit 1
          fi

  database-performance:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -f database/optimized-schema.sql
        env:
          PGPASSWORD: postgres

      - name: Run database performance tests
        run: |
          # 创建性能测试脚本
          cat > db-perf-test.js << 'EOF'
          const { createClient } = require('@supabase/supabase-js')
          
          async function runPerformanceTests() {
            const supabase = createClient(
              process.env.DATABASE_URL,
              process.env.SUPABASE_SERVICE_KEY
            )
            
            console.log('Running database performance tests...')
            
            const start = Date.now()
            
            // 测试基本查询性能
            await supabase.from('tools').select('*').limit(100)
            
            const queryTime = Date.now() - start
            console.log(`Query time: ${queryTime}ms`)
            
            if (queryTime > 1000) {
              console.error('Query time exceeds 1000ms')
              process.exit(1)
            }
            
            console.log('Database performance tests passed!')
          }
          
          runPerformanceTests().catch(console.error)
          EOF
          
          node db-perf-test.js
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  web-vitals-monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and test Web Vitals
        run: |
          npm run build
          npm start &
          sleep 10
          
          # 使用 web-vitals 库测试
          cat > web-vitals-test.js << 'EOF'
          const { getCLS, getFID, getFCP, getLCP, getTTFB } = require('web-vitals')
          
          let metrics = {}
          
          const logMetric = (metric) => {
            metrics[metric.name] = metric.value
            console.log(`${metric.name}: ${metric.value}`)
          }
          
          getCLS(logMetric)
          getFID(logMetric)
          getFCP(logMetric)
          getLCP(logMetric)
          getTTFB(logMetric)
          
          setTimeout(() => {
            // 检查核心指标
            if (metrics.LCP > 2500) {
              console.error('LCP exceeds 2.5s threshold')
              process.exit(1)
            }
            
            if (metrics.FID > 100) {
              console.error('FID exceeds 100ms threshold')
              process.exit(1)
            }
            
            if (metrics.CLS > 0.1) {
              console.error('CLS exceeds 0.1 threshold')
              process.exit(1)
            }
            
            console.log('Web Vitals tests passed!')
          }, 5000)
          EOF
          
          node web-vitals-test.js

  performance-regression:
    runs-on: ubuntu-latest
    needs: [lighthouse-ci, bundle-analysis]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: lighthouse-results
          path: ./lighthouse-results

      - name: Check performance regression
        run: |
          # 检查Lighthouse性能分数
          PERFORMANCE_SCORE=$(cat lighthouse-results/lhr.json | jq '.categories.performance.score * 100')
          echo "Performance score: $PERFORMANCE_SCORE"
          
          # 检查是否低于阈值
          if [ $(echo "$PERFORMANCE_SCORE < 90" | bc -l) -eq 1 ]; then
            echo "::error::Performance score $PERFORMANCE_SCORE is below 90 threshold"
            exit 1
          fi
          
          echo "Performance regression check passed!"

  notify-results:
    runs-on: ubuntu-latest
    needs: [lighthouse-ci, bundle-analysis, database-performance, web-vitals-monitoring]
    if: always()
    steps:
      - name: Notify performance results
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            Performance testing completed!
            
            Results:
            - Lighthouse CI: ${{ needs.lighthouse-ci.result }}
            - Bundle Analysis: ${{ needs.bundle-analysis.result }}
            - Database Performance: ${{ needs.database-performance.result }}
            - Web Vitals: ${{ needs.web-vitals-monitoring.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()