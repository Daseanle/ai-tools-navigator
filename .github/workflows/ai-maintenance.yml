name: AI Tools Automated Maintenance

on:
  schedule:
    # Trigger every day at midnight (UTC) to audit current directory health
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger within GitHub UI
  pull_request: # Validate incoming contributions
    branches: [ "main", "master" ]

# Explicitly grant write access to issues and PRs for notification bots
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-links-and-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Retrieve full history so git diff comparisons against main work properly

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: |
          npm ci || npm install --no-audit --no-fund

      # ----------------------------------------------------
      # SCENARIO A: Cron / Manual Execution (Live Directory Health)
      # ----------------------------------------------------
      - name: Run Links & Domain Security Audit (Cron/Dispatch)
        if: github.event_name != 'pull_request'
        id: link-checker
        run: node scripts/check-links.js
        # Intercept failures (exit code 1) to proceed to issue generation
        continue-on-error: true

      - name: Create Automated Notification Issue on Failures
        if: github.event_name != 'pull_request' && steps.link-checker.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = '🚨 [Automated Maintenance] Broken Links or Domain Redirections Detected';
            const issueBody = `
            ### ⚠️ Domain Integrity Verification Report
            
            Our automated background maintenance agent has detected dead links, network timeout failures, or suspicious redirections within the tools dataset.
            
            **Run ID:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            #### 🛠️ Recommended Steps:
            1. Go to the [Workflow logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) to locate specific URL failure diagnostics.
            2. Open and update [tools.json](file:///Volumes/MOVESPEED/下载/AIcode/ai-tools-navigator-main/data/tools.json) to patch or remove the problematic endpoints.
            3. Commit the changes. Once the dataset check passes again, this issue can be safely closed.
            
            *Auto-generated by GitHub Actions Maintenance Runner.*
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['bug', 'automated-audit']
            });

      # ----------------------------------------------------
      # SCENARIO B: Pull Request Review (NaviGuard-AI sandbox & reviewer bot)
      # ----------------------------------------------------
      - name: Run NaviGuard-AI PR Sandbox Reviewer
        if: github.event_name == 'pull_request'
        id: pr-reviewer
        run: node scripts/ai-pr-reviewer.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true

      - name: Post PR Review Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'pr-audit-report.md');
            
            if (fs.existsSync(reportPath)) {
              const body = fs.readFileSync(reportPath, 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            } else {
              console.log('No PR audit report file found to comment.');
            }

      # ----------------------------------------------------
      # STATUS FINALIZATION
      # ----------------------------------------------------
      - name: Finalize Workflow Status (Cron)
        if: github.event_name != 'pull_request' && steps.link-checker.outcome == 'failure'
        run: exit 1

      - name: Finalize Workflow Status (PR)
        if: github.event_name == 'pull_request' && steps.pr-reviewer.outcome == 'failure'
        run: exit 1
